services:
  leaflet:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./.git:/app/.git
    environment:
      - NODE_ENV=production
      - NOTES_DATA_DIR=/app/data
      - NOTES_DIR=/app/data/notes
      - SCREENSHOTS_DIR=/app/data/screenshots
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - PORT=3000
    restart: unless-stopped
