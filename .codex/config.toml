model = "gpt-5.5"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
project_doc_fallback_filenames = ["AGENTS.md"]

[agents]
max_threads = 6
max_depth = 2

[features]
# Hooks are currently disabled on Windows, but keeping this enabled makes the same project work on macOS/Linux without extra setup.
hooks = true

# Optional MCP servers
# Flip `enabled` to true for the servers you want to use in this project.

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
enabled = false
tool_timeout_sec = 60

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
enabled = false
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"
enabled = false

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
enabled = false
