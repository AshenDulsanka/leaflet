name: Bug Report
description: Report a bug or unexpected behaviour
title: "fix: "
labels: [bug]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is happening, and what should happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: running-via
    attributes:
      label: Running via
      options:
        - Docker
        - Local (pnpm dev)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Windows 11, macOS 14, Ubuntu 24.04"

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "e.g. Chrome 124, Firefox 126"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, error messages, console output, or anything else helpful.
